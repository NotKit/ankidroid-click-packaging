clickable_minimum_required: 8.0.0
builder: custom
framework: ubuntu-touch-24.04-1.x
kill: android-translation-layer
skip_review: true
restrict_arch: arm64

# art_standalone only supports self-hosted (native) builds, so this project
# must build inside a NATIVE arm64 container. On an x86_64 host docker runs
# it through qemu-user (needs qemu-user-static + binfmt_misc registered).
docker_image: docker.io/clickable/arm64-ut24.04-1.x-arm64

build:
  - ${ROOT}/build.sh

dependencies_host:
  - autoconf
  - automake
  - bison
  - ca-certificates-java
  - clang
  - cmake
  - curl
  - flex
  - generate-ninja
  - git
  - gperf
  - libtool
  - lld
  - meson
  - ninja-build
  - openjdk-17-jdk-headless
  - patch
  - pkg-config
  - python-is-python3
  - python3
  - rsync
  - ruby
  - unifdef
  - unzip
  - xz-utils
  - zip

dependencies_target:
  # atlas / android_translation_layer
  - libasound2-dev
  - libavcodec-dev
  - libswscale-dev
  - libdrm-dev
  - libegl-dev
  - libgl-dev
  - libgles-dev
  - libglib2.0-dev
  - libgraphene-1.0-dev
  - libgstreamer1.0-dev
  - libgstreamer-plugins-base1.0-dev
  - libgudev-1.0-dev
  - libopenxr-dev
  - libportal-dev
  - libsqlite3-dev
  - libvulkan-dev
  - libwayland-dev
  - wayland-protocols
  - libfontconfig-dev
  - libxkbcommon-dev
  - libgbm-dev
  # skia subproject (system libraries, see atlas/subprojects/packagefiles/skia)
  - libexpat1-dev
  - libfreetype-dev
  - libharfbuzz-dev
  - libjpeg-dev
  - libpng-dev
  - libwebp-dev
  - zlib1g-dev
  # art_standalone
  - libbsd-dev
  - libmd-dev
  - libcap-dev
  - libelf-dev
  - libicu-dev
  - liblz4-dev
  - liblzma-dev
  - libssl-dev
  - libunwind-dev
  # WPE WebKit (built from source in build.sh; noble does not package it)
  - libsoup-3.0-dev
  - libxslt1-dev
  - libtasn1-6-dev
  - libhyphen-dev
  - libwoff-dev
  - liblcms2-dev
  - libopenjp2-7-dev
  - libavif-dev
  - libgcrypt20-dev
  - libepoxy-dev
  - libsystemd-dev
